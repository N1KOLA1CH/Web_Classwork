<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}"/>
    <title>{{ title }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a href="/" style="text-decoration: none; color: inherit;">
                <h1>Миссия Колонизация Марса</h1>
            </a>

            <div class="d-flex align-items-center">
                {% if current_user.is_authenticated %}
                    <a class="nav-link text-dark me-4" href="/logout">
                        {{ current_user.name }} {{ current_user.surname }}
                    </a>
                {% else %}
                    <a class="btn btn-primary me-2" href="/register">Зарегистрироваться</a>
                    <a class="btn btn-success me-4" href="/login">Войти</a>
                {% endif %}
                <span class="navbar-brand">Mars One</span>
            </div>
        </div>
    </nav>
</header>
<main role="main" class="container-fluid mt-2">
    <h4 class="text-secondary subtitle">И на Марсе будут яблони цвести!</h4>
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>
</body>
</html>
