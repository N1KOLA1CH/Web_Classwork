{% extends 'base.html' %}

{% block content %}
    <h2 class="text-center">Размещение по каютам</h2>
    <div class="container mt-3">
        {% for user in astronauts %}
            <h4>
                {{ user }} - Каюта №{{ loop.index }}
                {% if loop.first %}
                    - капитан корабля
                {% endif %}
            </h4>
        {% endfor %}
    </div>
{% endblock %}
