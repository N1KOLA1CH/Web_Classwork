{% extends 'base.html' %}

{% block content %}
    <h2 class='text-center'>Пейзажи Марса</h2>

    <div id='marsCarousel' class='carousel slide mt-3' data-bs-ride='carousel' style='max-width: 800px; margin: auto;'>
        <div class='carousel-inner'>
            {% for image in images %}
                <div class="carousel-item {% if loop.first %}active{% endif %}">

                    <img src="{{ url_for('static', filename='img/landscapes/' + image) }}" class='d-block w-100' alt='Mars'>
                </div>
            {% endfor %}
        </div>
        <button class='carousel-control-prev' type='button' data-bs-target='#marsCarousel' data-bs-slide='prev'>
            <span class='carousel-control-prev-icon' aria-hidden='true'></span>
        </button>
        <button class='carousel-control-next' type='button' data-bs-target='#marsCarousel' data-bs-slide='next'>
            <span class='carousel-control-next-icon' aria-hidden='true'></span>
        </button>
    </div>

    <div class='mt-4 p-3 border rounded' style='max-width: 450px; margin: auto;'>
        <h5>Добавить картинку</h5>
        <form method='post' enctype='multipart/form-data'>
            <div class='mb-3'>
                <input class='form-control' type='file' name='file' required>
            </div>
            <button type='submit' class='btn btn-primary'>Отправить</button>
        </form>
    </div>
{% endblock %}
