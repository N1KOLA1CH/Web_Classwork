{% extends 'base.html' %}

{% block content %}
    <div class='container text-center mt-4'>
        <h2>{{ member.name }} {{ member.surname }}</h2>
        
        <div class='mt-3'>
            <img src="{{ url_for('static', filename=member.photo) }}" 
                 alt='Member photo' 
                 class='img-fluid' 
                 style='max-height: 400px;'>
        </div>

        <div class='mt-4'>
            <h5>{{ member.specialties|sort|join(", ") }}</h5>
        </div>
    </div>
{% endblock %}
